apiVersion: v1
kind: Service
metadata:
  name: arctos-robot-controller-service
  namespace: arctos-robot-controller
  labels:
    app: arctos-robot-controller
spec:
  selector:
    app: arctos-robot-controller
  ports:
  - name: http
    port: 5000
    targetPort: 5000
    protocol: TCP
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: arctos-robot-controller-headless
  namespace: arctos-robot-controller
  labels:
    app: arctos-robot-controller
spec:
  selector:
    app: arctos-robot-controller
  ports:
  - name: http
    port: 5000
    targetPort: 5000
    protocol: TCP
  clusterIP: None
  type: ClusterIP