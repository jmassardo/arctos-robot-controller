apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: arctos-data-pvc
  namespace: arctos-robot-controller
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: fast-ssd
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: arctos-config-pvc
  namespace: arctos-robot-controller
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: fast-ssd
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: arctos-logs-pvc
  namespace: arctos-robot-controller
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: fast-ssd
  resources:
    requests:
      storage: 5Gi
---
# Redis PVC
