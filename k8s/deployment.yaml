apiVersion: apps/v1
kind: Deployment
metadata:
  name: arctos-robot-controller
  namespace: arctos-robot-controller
  labels:
    app: arctos-robot-controller
    version: v1
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: arctos-robot-controller
  template:
    metadata:
      labels:
        app: arctos-robot-controller
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
      - name: arctos-robot-controller
        image: arctos-robot-controller:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
          name: http
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: arctos-config
              key: NODE_ENV
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: arctos-config
              key: PORT
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: arctos-config
              key: LOG_LEVEL
        - name: DB_PATH
          valueFrom:
            configMapKeyRef:
              name: arctos-config
              key: DB_PATH
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: arctos-config
              key: REDIS_URL
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: arctos-secrets
              key: JWT_SECRET
        - name: DB_ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: arctos-secrets
              key: DB_ENCRYPTION_KEY
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: arctos-secrets
              key: REDIS_PASSWORD
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
        volumeMounts:
        - name: data-storage
          mountPath: /app/data
        - name: config-storage
          mountPath: /app/config
        - name: logs-storage
          mountPath: /app/logs
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
              - ALL
      volumes:
      - name: data-storage
        persistentVolumeClaim:
          claimName: arctos-data-pvc
      - name: config-storage
        persistentVolumeClaim:
          claimName: arctos-config-pvc
      - name: logs-storage
        persistentVolumeClaim:
          claimName: arctos-logs-pvc
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - arctos-robot-controller
              topologyKey: kubernetes.io/hostname