apiVersion: v1
kind: ConfigMap
metadata:
  name: arctos-config
  namespace: arctos-robot-controller
data:
  NODE_ENV: "production"
  PORT: "5000"
  LOG_LEVEL: "info"
  DB_PATH: "/app/data/database.sqlite"
  REDIS_URL: "redis://arctos-redis:6379"
  RATE_LIMIT_WINDOW_MS: "900000"
  RATE_LIMIT_MAX_REQUESTS: "100"
  SESSION_TIMEOUT: "3600000"
  MAX_FILE_SIZE: "10485760"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: arctos-config-dev
  namespace: arctos-robot-controller-dev
data:
  NODE_ENV: "development"
  PORT: "5000"
  LOG_LEVEL: "debug"
  DB_PATH: "/app/data/database.sqlite"
  REDIS_URL: "redis://arctos-redis-dev:6379"
  RATE_LIMIT_WINDOW_MS: "900000"
  RATE_LIMIT_MAX_REQUESTS: "1000"
  SESSION_TIMEOUT: "3600000"
  MAX_FILE_SIZE: "10485760"