<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#007bff" />
    <title>Arctos Robot Controller - Offline</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .offline-container {
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        
        .offline-icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            opacity: 0.8;
        }
        
        .offline-title {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 1rem;
            line-height: 1.2;
        }
        
        .offline-message {
            font-size: 1.1rem;
            opacity: 0.9;
            margin-bottom: 2rem;
            line-height: 1.4;
        }
        
        .retry-button {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            color: white;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        
        .retry-button:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-1px);
        }
        
        .offline-features {
            margin-top: 2rem;
            padding: 1.5rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            text-align: left;
            backdrop-filter: blur(10px);
        }
        
        .offline-features h3 {
            margin-bottom: 1rem;
            font-size: 1.2rem;
        }
        
        .offline-features ul {
            list-style: none;
        }
        
        .offline-features li {
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
        }
        
        .offline-features li::before {
            content: "📱";
            margin-right: 0.5rem;
        }
        
        .connection-status {
            margin-top: 1rem;
            padding: 0.5rem;
            border-radius: 6px;
            font-size: 0.9rem;
            background: rgba(220, 53, 69, 0.2);
            border: 1px solid rgba(220, 53, 69, 0.3);
        }
        
        .connection-status.online {
            background: rgba(40, 167, 69, 0.2);
            border-color: rgba(40, 167, 69, 0.3);
        }
        
        @media (max-width: 480px) {
            .offline-title {
                font-size: 1.5rem;
            }
            
            .offline-message {
                font-size: 1rem;
            }
            
            .offline-icon {
                font-size: 3rem;
            }
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">🤖</div>
        <h1 class="offline-title">Arctos Robot Controller</h1>
        <p class="offline-message">
            You're currently offline. Some features may not be available until you reconnect.
        </p>
        
        <button class="retry-button" onclick="retryConnection()">
            Try to Reconnect
        </button>
        
        <div class="connection-status" id="connectionStatus">
            📶 Connection Status: Offline
        </div>
        
        <div class="offline-features">
            <h3>Available Offline Features:</h3>
            <ul>
                <li>View cached robot configurations</li>
                <li>Access saved positions</li>
                <li>Browse documentation</li>
                <li>Review settings and preferences</li>
            </ul>
        </div>
    </div>
    
    <script>
        function retryConnection() {
            window.location.reload();
        }
        
        // Monitor online/offline status
        function updateConnectionStatus() {
            const statusElement = document.getElementById('connectionStatus');
            if (navigator.onLine) {
                statusElement.textContent = '📶 Connection Status: Online';
                statusElement.className = 'connection-status online';
                // Auto-retry when back online
                setTimeout(() => {
                    window.location.reload();
                }, 2000);
            } else {
                statusElement.textContent = '📶 Connection Status: Offline';
                statusElement.className = 'connection-status';
            }
        }
        
        // Listen for connection changes
        window.addEventListener('online', updateConnectionStatus);
        window.addEventListener('offline', updateConnectionStatus);
        
        // Initial status check
        updateConnectionStatus();
        
        // Auto-retry every 30 seconds
        setInterval(() => {
            if (navigator.onLine) {
                fetch('/', { method: 'HEAD', cache: 'no-cache' })
                    .then(() => {
                        window.location.reload();
                    })
                    .catch(() => {
                        // Still offline, continue waiting
                    });
            }
        }, 30000);
    </script>
</body>
</html>
