version: '3.8'

services:
  arctos-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: arctos-dev
    ports:
      - "5000:5000"
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - .:/app
      - /app/node_modules
      - /app/client/node_modules
      - dev_data:/app/data
      - dev_logs:/app/logs
    networks:
      - arctos-dev-network
    stdin_open: true
    tty: true

volumes:
  dev_data:
  dev_logs:

networks:
  arctos-dev-network:
    driver: bridge