name: Dependency Management and Security

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      update_type:
        description: 'Type of update to perform'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write
  security-events: write

jobs:
  dependency-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json
      
      - name: Install dependencies
        run: |
          npm ci
          cd client && npm ci
      
      - name: Run npm audit (backend)
        id: audit-backend
        run: |
          npm audit --audit-level=moderate --json > audit-backend.json || true
          VULNERABILITIES=$(jq '.metadata.vulnerabilities.total' audit-backend.json)
          echo "backend-vulnerabilities=$VULNERABILITIES" >> $GITHUB_OUTPUT
          
          if [ "$VULNERABILITIES" -gt 0 ]; then
            echo "Found $VULNERABILITIES vulnerabilities in backend dependencies"
            npm audit --audit-level=moderate
          fi
      
      - name: Run npm audit (frontend)
        id: audit-frontend
        run: |
          cd client
          npm audit --audit-level=moderate --json > ../audit-frontend.json || true
          VULNERABILITIES=$(jq '.metadata.vulnerabilities.total' ../audit-frontend.json)
          echo "frontend-vulnerabilities=$VULNERABILITIES" >> $GITHUB_OUTPUT
          
          if [ "$VULNERABILITIES" -gt 0 ]; then
            echo "Found $VULNERABILITIES vulnerabilities in frontend dependencies"
            npm audit --audit-level=moderate
          fi
      
      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=medium --json-file-output=snyk-results.json
        continue-on-error: true
      
      - name: Upload security scan results
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-results
          path: |
            audit-backend.json
            audit-frontend.json
            snyk-results.json
      
      - name: Create security issue
        if: steps.audit-backend.outputs.backend-vulnerabilities > 0 || steps.audit-frontend.outputs.frontend-vulnerabilities > 0
        uses: actions/github-script@v7
        with:
          script: |
            const backendVulns = ${{ steps.audit-backend.outputs.backend-vulnerabilities }};
            const frontendVulns = ${{ steps.audit-frontend.outputs.frontend-vulnerabilities }};
            
            const title = `Security Alert: ${backendVulns + frontendVulns} vulnerabilities found`;
            const body = `## Security Audit Report
            
            🔍 **Backend vulnerabilities:** ${backendVulns}
            🔍 **Frontend vulnerabilities:** ${frontendVulns}
            
            ### Recommended Actions:
            1. Run \`npm audit fix\` to automatically fix vulnerabilities
            2. For major version updates, create separate PRs
            3. Review and test all dependency updates thoroughly
            
            ### Audit Details:
            - Backend audit: See \`audit-backend.json\` in artifacts
            - Frontend audit: See \`audit-frontend.json\` in artifacts
            
            This issue was created automatically by the dependency management workflow.
            `;
            
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['security', 'dependencies']
            });

  dependency-updates:
    name: Automated Dependency Updates
    runs-on: ubuntu-latest
    needs: dependency-audit
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        update-type: [patch, minor]
        package-scope: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json
      
      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
      
      - name: Update backend dependencies
        if: matrix.package-scope == 'backend'
        run: |
          # Install npm-check-updates
          npm install -g npm-check-updates
          
          # Update dependencies based on type
          case "${{ matrix.update-type }}" in
            "patch")
              ncu -u --target patch
              ;;
            "minor")
              ncu -u --target minor
              ;;
            "major")
              ncu -u --target latest
              ;;
          esac
          
          # Check if package.json changed
          if git diff --quiet package.json; then
            echo "No updates available for ${{ matrix.update-type }} level"
            echo "updates-available=false" >> $GITHUB_ENV
          else
            echo "updates-available=true" >> $GITHUB_ENV
            npm install
          fi
      
      - name: Update frontend dependencies
        if: matrix.package-scope == 'frontend'
        run: |
          cd client
          
          # Update dependencies based on type
          case "${{ matrix.update-type }}" in
            "patch")
              ncu -u --target patch
              ;;
            "minor")
              ncu -u --target minor
              ;;
            "major")
              ncu -u --target latest
              ;;
          esac
          
          # Check if package.json changed
          if git diff --quiet client/package.json; then
            echo "No updates available for ${{ matrix.update-type }} level"
            echo "updates-available=false" >> $GITHUB_ENV
          else
            echo "updates-available=true" >> $GITHUB_ENV
            npm install
          fi
      
      - name: Run tests after updates
        if: env.updates-available == 'true'
        run: |
          # Run quick tests to ensure updates don't break functionality
          npm run lint || exit 1
          npm run test:unit || exit 1
          
          if [ "${{ matrix.package-scope }}" == "frontend" ]; then
            cd client
            npm run lint || exit 1
            npm test -- --passWithNoTests --watchAll=false || exit 1
          fi
      
      - name: Create Pull Request
        if: env.updates-available == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(${{ matrix.package-scope }}): update ${{ matrix.update-type }} dependencies"
          title: "🔄 Update ${{ matrix.package-scope }} ${{ matrix.update-type }} dependencies"
          body: |
            ## Dependency Updates
            
            This PR updates ${{ matrix.package-scope }} dependencies to the latest ${{ matrix.update-type }} versions.
            
            ### What's included:
            - ✅ ${{ matrix.update-type | title }} version updates only
            - ✅ Automated testing passed
            - ✅ Security audit compliance
            
            ### Manual verification needed:
            - [ ] Integration tests pass
            - [ ] Application functionality verified
            - [ ] Performance impact assessed
            
            ### Auto-merge conditions:
            - ✅ All automated tests pass
            - ✅ No breaking changes detected
            - ✅ Security vulnerabilities addressed
            
            ---
            Generated by GitHub Actions workflow
          branch: "dependencies/${{ matrix.package-scope }}-${{ matrix.update-type }}-updates"
          delete-branch: true
          labels: |
            dependencies
            ${{ matrix.package-scope }}
            ${{ matrix.update-type }}
            automated

  license-compliance:
    name: License Compliance Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json
      
      - name: Install dependencies
        run: |
          npm ci
          cd client && npm ci
      
      - name: Install license checker
        run: npm install -g license-checker
      
      - name: Check backend licenses
        run: |
          license-checker --json > backend-licenses.json
          license-checker --summary
      
      - name: Check frontend licenses
        run: |
          cd client
          license-checker --json > ../frontend-licenses.json
          license-checker --summary
      
      - name: Analyze license compliance
        run: |
          node << 'EOF'
          const fs = require('fs');
          
          const allowedLicenses = [
            'MIT', 'BSD', 'Apache-2.0', 'ISC', 'BSD-2-Clause', 'BSD-3-Clause',
            'Apache License 2.0', 'The MIT License', 'ISC License'
          ];
          
          const restrictedLicenses = ['GPL', 'AGPL', 'LGPL', 'SSPL', 'BUSL'];
          
          function checkLicenses(filePath, scope) {
            const licenses = JSON.parse(fs.readFileSync(filePath, 'utf8'));
            const issues = [];
            
            for (const [pkg, info] of Object.entries(licenses)) {
              if (restrictedLicenses.some(restricted => 
                info.licenses && info.licenses.includes(restricted))) {
                issues.push(`${scope}: ${pkg} uses restricted license: ${info.licenses}`);
              }
            }
            
            return issues;
          }
          
          const backendIssues = checkLicenses('backend-licenses.json', 'Backend');
          const frontendIssues = checkLicenses('frontend-licenses.json', 'Frontend');
          
          const allIssues = [...backendIssues, ...frontendIssues];
          
          if (allIssues.length > 0) {
            console.log('❌ License compliance issues found:');
            allIssues.forEach(issue => console.log(issue));
            process.exit(1);
          } else {
            console.log('✅ All licenses are compliant');
          }
          EOF
      
      - name: Upload license reports
        uses: actions/upload-artifact@v4
        with:
          name: license-reports
          path: |
            backend-licenses.json
            frontend-licenses.json

  dockerfile-security:
    name: Dockerfile Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Hadolint
        uses: github/super-linter/slim@v4
        env:
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_ALL_CODEBASE: false
          VALIDATE_DOCKERFILE_HADOLINT: true
      
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'
      
      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-fs-results.sarif'